<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="weather-card">
        <h1>Weather App</h1>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name (e.g., London)">
            <button id="searchBtn">Search</button>
        </div>

        <p id="loading" class="hidden">Fetching weather data...</p>

        <p id="errorMsg" class="hidden error"></p>

        <div id="weatherData" class="hidden">
            <h2 id="cityName"></h2>
            <div class="weather-info">
                <p><strong>Temperature:</strong> <span id="temp"></span></p>
                <p><strong>Condition:</strong> <span id="condition"></span></p>
                <p><strong>Humidity:</strong> <span id="humidity"></span></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
